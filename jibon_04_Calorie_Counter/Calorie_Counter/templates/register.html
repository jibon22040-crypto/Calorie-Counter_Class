<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Your App</title>
    <style>
        /* Shared Variables & Background */
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 40px 20px;
        }

        .register-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 480px; /* Slightly wider for dual forms */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        h2 {
            margin: 0 0 10px; text-align: center;
            font-size: 1.8rem; color: var(--text-main);
        }

        .subtitle {
            text-align: center; color: var(--text-muted);
            margin-bottom: 30px; font-size: 0.9rem;
        }

        /* --- Django Form Styling Hacks --- */
        /* Targets the <p> tags generated by .as_p */
        form p {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        form label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            margin-left: 4px;
            color: var(--text-main);
        }

        /* Targets the inputs within the <p> tags */
        form input, form select, form textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        form input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* Help text (e.g., password requirements) */
        .helptext {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            margin-left: 4px;
            display: block;
        }

        ul.errorlist {
            padding: 0; margin: 0 0 10px 0;
            list-style: none; color: #dc2626;
            font-size: 0.8rem; font-weight: 600;
        }

        /* --- Button & Footer --- */
        .register-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .register-btn:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px var(--primary-glow);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="register-card">
            <h2>Join Us</h2>
            <p class="subtitle">Create your account to get started</p>

            <form method="POST">
                {% csrf_token %}
                
                {# Django forms can be split or combined into one flow #}
                <div class="form-section">
                    {{ user_form.as_p }}
                    {{ profile_form.as_p }}
                </div>

                <button type="submit" class="register-btn">Create Account</button>
            </form>

            <div class="footer">
                Already have an account? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>

</body>
</html>
